<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nordic Team Lessinia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .card { background-color: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
    </style>
</head>
<body class="p-4">

    <header class="mb-6 text-center">
        <h1 class="text-2xl font-bold tracking-tight text-blue-400">NORDIC TEAM LESSINIA</h1>
        <p class="text-sm text-slate-400">Risultati e Neve • Verona</p>
    </header>

    <div class="card flex justify-between items-center border-l-4 border-blue-500">
        <div>
            <p class="text-xs uppercase text-slate-400 font-bold">San Giorgio</p>
            <p class="text-xl font-bold">-2°C <span class="text-sm font-normal">❄️</span></p>
        </div>
        <div class="text-right">
            <p class="text-xs uppercase text-slate-400">Piste</p>
            <p class="text-green-400 font-bold italic text-sm">BATTUTE ✅</p>
        </div>
    </div>

    <div class="mt-8">
        <h2 class="text-lg font-semibold mb-4 flex items-center">
            🏆 Ultime Gare
        </h2>
        
        <div class="card">
            <div class="flex justify-between mb-2 border-b border-slate-700 pb-2">
                <span class="text-xs font-bold text-blue-300">Campionato Provinciale</span>
                <span class="text-xs text-slate-500">22 Febbraio</span>
            </div>
            <div class="space-y-2">
                <div class="flex justify-between text-sm">
                    <span>1. Luca Z. (SC Bosco)</span>
                    <span class="font-mono text-blue-400">12:45.2</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span>2. Matteo F. (SC Verona)</span>
                    <span class="font-mono text-slate-400">+12.4</span>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 w-full bg-slate-900 border-t border-slate-800 p-3 flex justify-around">
        <button class="text-blue-400 text-xs flex flex-col items-center"><span>🏆</span>Gare</button>
        <button class="text-slate-500 text-xs flex flex-col items-center"><span>❄️</span>Centri</button>
        <button class="text-slate-500 text-xs flex flex-col items-center"><span>👤</span>Atleti</button>
    </nav>

</body>
</html>
